<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Almoxarifado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">📦 Almoxarifado Pro - Painel de Controle</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white fw-bold" id="tituloForm">
                    ➕ Cadastrar Material
                </div>
                <div class="card-body">
                    <form id="formEpi">
                        <input type="hidden" id="editandoId">
                        
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Código do Item <small class="fw-normal">(opcional)</small></label>
                            <input type="text" id="codigo" class="form-control" placeholder="Ex: COD-1234">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Nome / Descrição</label>
                            <input type="text" id="nome" class="form-control" required placeholder="Ex: Gás R410A - Cilindro 01">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Categoria</label>
                            <select id="categoria" class="form-select">
                                <option value="EPI">EPI (Proteção)</option>
                                <option value="Consumível">Consumível</option>
                                <option value="Ferramenta">Ferramenta</option>
                                <option value="Gás">Gás</option>
                                <option value="Cobre">Cobre</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>

                        <div class="row d-none" id="camposMedidas">
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted fw-bold">Peso (Kg)</label>
                                <input type="number" step="0.01" id="peso" class="form-control" placeholder="Ex: 11.5">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted fw-bold">Comp. (m)</label>
                                <input type="number" step="0.01" id="comprimento" class="form-control" placeholder="Ex: 15">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Número do CA <small class="fw-normal">(opcional)</small></label>
                            <input type="text" id="ca" class="form-control">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted fw-bold">Validade CA</label>
                                <input type="date" id="validade" class="form-control">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted fw-bold">Qtd.</label>
                                <input type="number" id="quantidade" class="form-control" value="1" min="0" required>
                            </div>
                        </div>
                        
                        <button type="submit" id="btnSalvar" class="btn btn-primary w-100 fw-bold shadow-sm">Salvar Material</button>
                        <button type="button" id="btnCancelarEdicao" class="btn btn-secondary w-100 mt-2 d-none">Cancelar Edição</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0 mb-3">
                <div class="card-body">
                    <input type="text" id="barraPesquisa" class="form-control form-control-lg border-primary" placeholder="🔍 Pesquisar por nome, código ou categoria...">
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white fw-bold">📊 Estoque Atual</div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Cód</th>
                                    <th>Nome</th>
                                    <th>Categoria</th>
                                    <th>Medidas</th>
                                    <th class="text-center">Qtd</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaEpis">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
